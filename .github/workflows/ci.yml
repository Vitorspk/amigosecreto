name: CI Build & Internal Deploy

on:
  push:
    branches:
      - master
    tags-ignore:
      - 'v*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Internal Track
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit count

      - name: Compute CI version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Use total git commit count to ensure unique, monotonically increasing
          # versionCode shared with release workflow (avoids counter collision).
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((100 + COMMIT_COUNT))
          VERSION_NAME="2.0-dev.${SHORT_SHA}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "::notice::Internal build: versionName=$VERSION_NAME versionCode=$VERSION_CODE (commits=$COMMIT_COUNT)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/amigosecreto.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/amigosecreto.keystore" >> $GITHUB_ENV

      - name: Run unit tests
        run: ./gradlew :app:testReleaseUnitTest
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run lint checks
        run: ./gradlew :app:lintRelease
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PciVersionCode=${{ env.VERSION_CODE }} \
            -PciVersionName=${{ env.VERSION_NAME }}
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.amigosecreto.sorteio
          releaseFile: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/amigosecreto.keystore
