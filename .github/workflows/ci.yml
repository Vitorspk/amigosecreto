name: CI Build & Internal Deploy

on:
  push:
    branches:
      - master
    tags-ignore:
      - 'v*'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Internal Track
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history for commit count

      - name: Compute CI version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Use total git commit count to ensure unique, monotonically increasing
          # versionCode shared with release workflow (avoids counter collision).
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((100 + COMMIT_COUNT))
          VERSION_NAME="2.0-dev.${SHORT_SHA}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "::notice::Internal build: versionName=$VERSION_NAME versionCode=$VERSION_CODE (commits=$COMMIT_COUNT)"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not configured"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/amigosecreto.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/amigosecreto.keystore" >> $GITHUB_ENV

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Disables JIT C2 compiler to prevent SIGSEGV crash in libjvm.so
          # when running Robolectric tests with Java 21 on ubuntu-latest runners.
          # Scoped to CI only to avoid degrading local developer build performance.
          GRADLE_OPTS: "-XX:TieredStopAtLevel=1"

      - name: Run lint checks
        run: ./gradlew :app:lintRelease
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PciVersionCode=${{ env.VERSION_CODE }} \
            -PciVersionName=${{ env.VERSION_NAME }}
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: internal-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.amigosecreto.sorteio
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/amigosecreto.keystore
