name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Testes unitarios + Robolectric + Lint (sem emulador, rapido)
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests & Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Run unit tests (JUnit + Robolectric)
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: unit-test-results-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Publish unit test results as PR check
        if: always()
        uses: mikepenz/action-junit-report@97744eca465b8df9e6e33271cb155003f85327f1 # v5.5.0
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/TEST-*.xml'
          check_name: 'Unit Test Results'
          fail_on_failure: true
          require_tests: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Lint roda com if: always() para garantir relatorio mesmo quando testes falham
      - name: Run lint
        if: always()
        run: ./gradlew :app:lintRelease

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lint-results-pr-${{ github.event.pull_request.number }}
          path: app/build/reports/lint-results-release.html
          retention-days: 14

  # -----------------------------------------------------------------------
  # Job 2: Testes instrumentados Espresso (requer emulador Android)
  # -----------------------------------------------------------------------
  instrumented-tests:
    name: Instrumented Tests (Espresso)
    runs-on: ubuntu-24.04
    needs: unit-tests
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: instrumented-test-results-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 14

      - name: Publish instrumented test results as PR check
        if: always()
        uses: mikepenz/action-junit-report@97744eca465b8df9e6e33271cb155003f85327f1 # v5.5.0
        with:
          report_paths: 'app/build/outputs/androidTest-results/connected/**/*.xml'
          check_name: 'Instrumented Test Results (Espresso)'
          fail_on_failure: true
          require_tests: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # Job 3: Verificacao de build (compila APK debug)
  # Obs: connectedDebugAndroidTest ja compila o APK no Job 2, mas runners
  # distintos nao compartilham cache. O objetivo principal aqui e publicar
  # o APK debug como artefato de QA para download rapido.
  # -----------------------------------------------------------------------
  build-check:
    name: Build Verification
    runs-on: ubuntu-24.04
    needs: [unit-tests, instrumented-tests]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: debug-apk-pr-${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
