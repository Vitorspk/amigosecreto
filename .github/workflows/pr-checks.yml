name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Testes unitarios + Robolectric + Lint (sem emulador, rapido)
  # -----------------------------------------------------------------------
  unit-tests:
    name: Unit Tests & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Run unit tests (JUnit + Robolectric)
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-test-results-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Publish unit test results as PR check
        if: always()
        uses: mikepenz/action-junit-report@97744eca465b8df9e6e33271cb155003f85327f1 # v5.5.0
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/TEST-*.xml'
          check_name: 'Unit Test Results'
          fail_on_failure: true
          require_tests: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        run: ./gradlew :app:lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-results-pr-${{ github.event.pull_request.number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # -----------------------------------------------------------------------
  # Job 2: Testes instrumentados Espresso (requer emulador Android)
  # -----------------------------------------------------------------------
  instrumented-tests:
    name: Instrumented Tests (Espresso)
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: instrumented-test-results-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 14

      - name: Publish instrumented test results as PR check
        if: always()
        uses: mikepenz/action-junit-report@97744eca465b8df9e6e33271cb155003f85327f1 # v5.5.0
        with:
          report_paths: 'app/build/outputs/androidTest-results/connected/**/*.xml'
          check_name: 'Instrumented Test Results (Espresso)'
          fail_on_failure: true
          require_tests: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # Job 3: Verificacao de build (compila APK debug)
  # -----------------------------------------------------------------------
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [unit-tests, instrumented-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debug-apk-pr-${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
