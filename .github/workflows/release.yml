name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for creating GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history for commit count

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format v*.*[.*]"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION_NAME=${TAG#v}" >> $GITHUB_ENV

      - name: Compute versionCode
        run: |
          # Production releases use offset 10000 + commit count to stay permanently above
          # internal track builds (offset 100 + commit count), ensuring the Play Store
          # never rejects a production upload due to a versionCode already used internally.
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((10000 + COMMIT_COUNT))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "::notice::Building versionName=${{ env.VERSION_NAME }} versionCode=$VERSION_CODE (commits=$COMMIT_COUNT)"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON secret is not configured"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/amigosecreto.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/amigosecreto.keystore" >> $GITHUB_ENV

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run lint checks
        run: ./gradlew :app:lintRelease
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PciVersionCode=${{ env.VERSION_CODE }} \
            -PciVersionName=${{ env.VERSION_NAME }}
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload mapping file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Publish to Google Play (production)
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.amigosecreto.sorteio
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.VERSION_NAME }}"
          body: |
            ## AmigoSecreto ${{ env.VERSION_NAME }}

            **versionCode:** ${{ env.VERSION_CODE }}
            **Track:** Production

            Publicado automaticamente no Google Play Store.
          files: |
            app/build/outputs/mapping/release/mapping.txt
          draft: false
          prerelease: false

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/amigosecreto.keystore
