name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for creating GitHub Releases

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format v*.*[.*]"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION_NAME=${TAG#v}" >> $GITHUB_ENV

      - name: Compute versionCode
        run: |
          # Base offset ensures CI versionCodes are always higher than
          # any manually published version (currently versionCode 9).
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "::notice::Building versionName=${{ env.VERSION_NAME }} versionCode=$VERSION_CODE"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/amigosecreto.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/amigosecreto.keystore" >> $GITHUB_ENV

      - name: Run lint checks
        run: ./gradlew :app:lintRelease
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PciVersionCode=${{ env.VERSION_CODE }} \
            -PciVersionName=${{ env.VERSION_NAME }}
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Publish to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.amigosecreto.sorteio
          releaseFile: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.VERSION_NAME }}"
          body: |
            ## AmigoSecreto ${{ env.VERSION_NAME }}

            **versionCode:** ${{ env.VERSION_CODE }}
            **Track:** Production

            Publicado automaticamente no Google Play Store.
          files: |
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/amigosecreto.keystore
