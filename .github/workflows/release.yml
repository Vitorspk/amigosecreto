name: Release to Play Store

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for creating GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for commit count

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format v*.*[.*]"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION_NAME=${TAG#v}" >> $GITHUB_ENV

      - name: Compute versionCode
        run: |
          # Use total git commit count to ensure unique, monotonically increasing
          # versionCode across ALL workflows (CI and release share the same counter).
          # Base offset of 100 ensures we stay above any manually published versions.
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((100 + COMMIT_COUNT))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "::notice::Building versionName=${{ env.VERSION_NAME }} versionCode=$VERSION_CODE (commits=$COMMIT_COUNT)"

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON secret is not configured"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/amigosecreto.keystore
          echo "CI_KEYSTORE_PATH=$RUNNER_TEMP/amigosecreto.keystore" >> $GITHUB_ENV

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run lint checks
        run: ./gradlew :app:lintRelease
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -PciVersionCode=${{ env.VERSION_CODE }} \
            -PciVersionName=${{ env.VERSION_NAME }}
        env:
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload mapping file
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Publish to Google Play (production)
        uses: r0adkll/upload-google-play@0250910c30c1c098744c510e32e1659c6af78eb6 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.amigosecreto.sorteio
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.VERSION_NAME }}"
          body: |
            ## AmigoSecreto ${{ env.VERSION_NAME }}

            **versionCode:** ${{ env.VERSION_CODE }}
            **Track:** Production

            Publicado automaticamente no Google Play Store.
          files: |
            app/build/outputs/mapping/release/mapping.txt
          draft: false
          prerelease: false

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/amigosecreto.keystore
